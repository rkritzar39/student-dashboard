<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus LMS | Advanced Student Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">

    <!-- Admin Authentication Modal -->
    <div id="admin-modal" class="modal">
        <div class="modal-content glass-card">
            <div class="modal-header">
                <h2><i class="fas fa-shield-halved"></i> Admin Login</h2>
                <button class="close-btn" onclick="closeAdminModal()">&times;</button>
            </div>
            <p>Accessing the Admin Portal allows you to mutate student data, grades, and schedules.</p>
            <div class="form-group">
                <input type="password" id="admin-pass" placeholder="Enter Access Code (1234)">
            </div>
            <button class="btn btn-primary full-width" onclick="verifyAdmin()">Unlock Portal</button>
        </div>
    </div>

    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <div class="logo-box"><i class="fas fa-terminal"></i></div>
                    <span>Nexus<strong>LMS</strong></span>
                </div>
                <button class="mobile-only close-sidebar" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
            </div>

            <nav class="nav-links">
                <div class="nav-item active" data-view="dashboard" onclick="navigate('dashboard')">
                    <i class="fas fa-grid-2"></i> <span>Dashboard</span>
                </div>
                <div class="nav-item" data-view="courses" onclick="navigate('courses')">
                    <i class="fas fa-book-bookmark"></i> <span>Courses</span>
                </div>
                <div class="nav-item" data-view="assignments" onclick="navigate('assignments')">
                    <i class="fas fa-list-check"></i> <span>Assignments</span>
                </div>
                <div class="nav-item" data-view="grades" onclick="navigate('grades')">
                    <i class="fas fa-chart-simple"></i> <span>Grades</span>
                </div>
                <div class="nav-item" data-view="schedule" onclick="navigate('schedule')">
                    <i class="fas fa-calendar-days"></i> <span>Schedule</span>
                </div>
                
                <div class="nav-divider"></div>
                
                <div class="nav-item admin-link hidden" id="admin-nav" data-view="admin" onclick="navigate('admin')">
                    <i class="fas fa-sliders"></i> <span>Admin Panel</span>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button class="admin-unlock" id="admin-trigger" onclick="openAdminModal()">
                    <i class="fas fa-lock"></i> <span>Admin Access</span>
                </button>
            </div>
        </aside>

        <!-- Content Area -->
        <main class="main-stage">
            <header class="top-nav">
                <div class="nav-left">
                    <button class="burger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <div class="breadcrumb" id="view-indicator">Dashboard</div>
                </div>
                <div class="nav-right">
                    <select id="semester-selector" class="glass-select" onchange="switchSemester(this.value)"></select>
                    <div class="user-pill">
                        <span id="time-display">00:00:00</span>
                        <div class="avatar"><img src="https://ui-avatars.com/api/?name=Student&background=6366f1&color=fff"></div>
                    </div>
                </div>
            </header>

            <div id="mount" class="view-mount">
                <!-- Dynamic Content Here -->
            </div>
        </main>

        <!-- AI Assistant Hub -->
        <div class="ai-widget" id="ai-hub">
            <div class="ai-header" onclick="toggleAI()">
                <div class="ai-status">
                    <span class="pulse"></span>
                    <i class="fas fa-robot"></i> Nexus AI
                </div>
                <i class="fas fa-chevron-up" id="ai-icon"></i>
            </div>
            <div class="ai-content">
                <div class="chat-area" id="chat-area">
                    <div class="ai-msg">Hi! I'm your Gemini-powered AI. I have access to your GPA and assignments. What can I analyze for you?</div>
                </div>
                <div class="chat-input">
                    <input type="text" id="ai-query" placeholder="Ask about your grades...">
                    <button onclick="askAI()"><i class="fas fa-arrow-up"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

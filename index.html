<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Progress Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">
    
    <div class="mobile-toggle" id="mobile-toggle">
        <i class="fas fa-bars"></i>
    </div>

    <div class="container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <span>UniPortal</span>
                </div>
            </div>
            <ul class="nav-links">
                <li class="active" data-section="dashboard"><i class="fas fa-th-large"></i> <span>Dashboard</span></li>
                <li data-section="courses"><i class="fas fa-book"></i> <span>Courses</span></li>
                <li data-section="assignments"><i class="fas fa-tasks"></i> <span>Assignments</span></li>
                <li data-section="grades"><i class="fas fa-chart-line"></i> <span>Grades</span></li>
                <li data-section="ai-assistant"><i class="fas fa-robot"></i> <span>AI Assistant</span></li>
                
                <!-- Admin link is hidden by default -->
                <li id="admin-nav-item" style="display: none;" data-section="admin"><i class="fas fa-user-shield"></i> <span>Admin Panel</span></li>
            </ul>
            
            <div class="sidebar-footer">
                <button id="unlock-admin-btn" title="Admin Login"><i class="fas fa-lock"></i></button>
                <div class="theme-switch-wrapper">
                    <i class="fas fa-moon"></i>
                    <label class="theme-switch">
                        <input type="checkbox" id="dark-mode-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <div class="header-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search portal...">
                </div>
                <div class="header-user">
                    <div class="clock" id="real-time-clock">00:00:00</div>
                    <div class="notifications">
                        <i class="fas fa-bell"></i>
                        <span class="badge" id="notif-badge">0</span>
                    </div>
                    <div class="profile-preview" id="student-profile-header"></div>
                </div>
            </header>

            <div id="content-render-area">
                <!-- Content Injected by JS -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
